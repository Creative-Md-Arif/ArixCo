<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>AriX Co - Premium Clothing E-commerce Store | Shop Online Today</title>
    <meta name="description" content="AriX Co is your ultimate online shopping destination. Discover premium quality products, best deals, fast delivery, and secure payment options. Shop now!" />
    <meta name="keywords" content="online shopping, e-commerce, buy online, best deals, premium products, fast delivery, AriX Co, online store" />
    <meta name="author" content="AriX Co" />
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arixco.com/" />
    <meta property="og:title" content="AriX Co - Premium E-commerce Store" />
    <meta property="og:description" content="Discover premium quality products with best deals and fast delivery. Shop online at AriX GeaR today!" />
    <meta property="og:image" content="https://arixco.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://arixco.com/" />
    <meta property="twitter:title" content="AriX co - Premium Clothing E-commerce Store" />
    <meta property="twitter:description" content="Discover premium quality products with best deals and fast delivery. Shop online at AriX GeaR today!" />
    <meta property="twitter:image" content="https://arixco.com/og-image.jpg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://arixco.com/" />

    <!-- Preconnect & DNS Prefetch for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://arixgear.com" />
    
    <!-- Preload Critical Images -->
    <link rel="preload" as="image" href="/logo.png" />
    <link rel="preload" as="image" href="/hero-banner.jpg" />

    <!-- Structured Data for SEO (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "OnlineStore",
        "name": "AriX Co",
        "url": "https://arixco.com/",
        "description": "Premium Clothing E-commerce Store",
        "image": "https://arixco.com/og-image.jpg"
      }
    </script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        background: #ffffff;
      }

      /* ✅ সিম্পল রুট হাইট */
      #root {
        min-height: 100vh;
      }
      #root:empty {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #root:empty::after {
        content: "";
        width: 36px;
        height: 36px;
        border: 3px solid #e5e5e5;
        border-top-color: #6e2594;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
